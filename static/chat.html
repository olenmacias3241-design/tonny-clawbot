<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>与龙虾对话 · Claw Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a32;
      --text: #e4e4e7;
      --text-muted: #8b8b95;
      --accent: #22c55e;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .top-strip { flex-shrink: 0; }
    .top-bar h1 { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .top-bar h1::before { content: ''; width: 4px; height: 1em; background: var(--accent); border-radius: 2px; }
    .btn-link { color: var(--text-muted); font-size: 0.9rem; text-decoration: none; }
    .btn-link:hover { color: var(--accent); }
    #messages { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 720px; margin: 0 auto; width: 100%; }
    .msg { margin-bottom: 1rem; display: flex; gap: 0.75rem; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .msg.user .msg-avatar { background: var(--accent); }
    .msg-bubble { max-width: 85%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: var(--accent); color: var(--bg); }
    .msg.bot .msg-bubble { background: var(--surface); border: 1px solid var(--border); }
    .msg-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
    .input-bar { padding: 1rem 1.5rem; border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-wrap { max-width: 720px; margin: 0 auto; display: flex; gap: 0.5rem; }
    .model-wrap { max-width: 720px; margin: 0 auto 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .model-wrap label { color: var(--text-muted); font-size: 0.85rem; }
    .model-wrap select { padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.85rem; cursor: pointer; }
    #input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.95rem; }
    #input:focus { outline: none; border-color: var(--accent); }
    #send { padding: 0.75rem 1.25rem; border-radius: 8px; border: none; background: var(--accent); color: var(--bg); font-weight: 500; cursor: pointer; font-size: 0.95rem; }
    #send:hover { opacity: 0.9; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { color: var(--text-muted); font-size: 0.9rem; }
    .error { color: #ef4444; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header class="top-strip" style="display:flex;align-items:center;gap:1.5rem;padding:0.75rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.9rem">
    <a href="/chat" style="color:var(--accent);text-decoration:none;font-weight:600">Claw Bot</a>
    <a href="/daily" style="color:var(--text-muted);text-decoration:none">日报周报</a>
    <a href="/guide" style="color:var(--text-muted);text-decoration:none">仓库文档</a>
    <a href="/config" style="color:var(--text-muted);text-decoration:none">配置</a>
  </header>
  <div id="messages"></div>
  <div class="input-bar">
    <div class="model-wrap">
      <label>模型：</label>
      <select id="model">
        <option value="">服务器默认 (.env)</option>
        <optgroup label="OpenAI">
          <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4-turbo">gpt-4-turbo</option>
        </optgroup>
        <optgroup label="OpenRouter / Llama">
          <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
          <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
          <option value="llama-3.1-70b-versatile">llama-3.1-70b-versatile</option>
          <option value="meta-llama/llama-3.3-70b-instruct">meta-llama/llama-3.3-70b-instruct</option>
        </optgroup>
      </select>
    </div>
    <div class="input-wrap">
      <input type="text" id="input" placeholder="输入消息，与龙虾对话…" autocomplete="off" />
      <button type="button" id="send">发送</button>
    </div>
  </div>
  <script>
    const API_BASE = '';
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const modelEl = document.getElementById('model');
    let conversationId = null;

    function addMessage(role, content, isError) {
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
      const avatar = role === 'user' ? '你' : '🦞';
      div.innerHTML = '<div class="msg-avatar">' + avatar + '</div><div class="msg-bubble">' + renderMessage(content) + '</div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s || '';
      return div.innerHTML.replace(/\n/g, '<br>');
    }
    function renderMessage(content) {
      if (!content) return '';
      const escaped = escapeHtml(content);
      return escaped.replace(/\[([^\]]+)\]\((\/api\/download\/generated\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
    }

    async function send() {
      const text = (inputEl.value || '').trim();
      if (!text) return;
      inputEl.value = '';
      addMessage('user', text);
      sendBtn.disabled = true;
      const loading = document.createElement('div');
      loading.className = 'msg bot';
      loading.innerHTML = '<div class="msg-avatar">🦞</div><div class="msg-bubble loading">龙虾正在想…</div>';
      messagesEl.appendChild(loading);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const body = { message: text };
        if (conversationId) body.conversation_id = conversationId;
        const model = (modelEl && modelEl.value) ? modelEl.value.trim() : '';
        if (model) body.model = model;
        const res = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        loading.remove();
        if (res.ok && data.conversation_id) {
          conversationId = data.conversation_id;
          let show = data.message || data.error || '（无回复）';
          if (data.error && data.message && data.message.includes('出错')) show += '\n\n详情: ' + data.error;
          addMessage('bot', show);
        } else {
          addMessage('bot', data.detail || data.error || data.message || '请求失败', true);
        }
      } catch (e) {
        loading.remove();
        addMessage('bot', '网络错误: ' + (e.message || '请稍后重试'), true);
      }
      sendBtn.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
