<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>仓库文档与代码分析 · Claw Bot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a32;
      --text: #e4e4e7;
      --text-muted: #8b8b95;
      --accent: #22c55e;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
    .container { max-width: 880px; margin: 0 auto; padding: 2rem 1.5rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
    .top-bar h1 { font-size: 1.35rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .top-bar h1::before { content: ''; width: 4px; height: 1.1em; background: var(--accent); border-radius: 2px; }
    .btn-link { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; text-decoration: none; padding: 0.4rem 0; }
    .btn-link:hover { color: var(--accent); }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; }
    .tab { padding: 0.5rem 1rem; font-size: 0.9rem; border-radius: 6px; cursor: pointer; color: var(--text-muted); background: transparent; border: 1px solid transparent; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); background: rgba(34,197,94,0.1); border-color: var(--accent); }
    .content-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; min-height: 400px; }
    .content-panel h1, .content-panel h2, .content-panel h3 { margin: 1rem 0 0.5rem; color: var(--text); }
    .content-panel h1 { font-size: 1.2rem; }
    .content-panel h2 { font-size: 1.05rem; }
    .content-panel table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; }
    .content-panel th, .content-panel td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; }
    .content-panel th { background: var(--bg); color: var(--accent); }
    .content-panel code, .content-panel pre { background: var(--bg); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85em; }
    .content-panel pre { padding: 0.75rem; overflow-x: auto; white-space: pre; }
    .content-panel ul, .content-panel ol { margin: 0.5rem 0 0 1.25rem; }
    .content-panel a { color: var(--accent); }
    .code-file { margin-bottom: 1rem; padding: 0.75rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
    .danger { color: #ef4444; }
    .repo-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .repo-bar label { color: var(--text-muted); font-size: 0.9rem; }
    .repo-bar input { flex: 1; min-width: 200px; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.9rem; }
    .repo-bar button { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent); color: var(--bg); cursor: pointer; font-size: 0.9rem; }
    .repo-bar button:hover { opacity: 0.9; }
    .app-wrap { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 1.25rem 0; overflow-y: auto;
    }
    .sidebar-title { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 1.25rem 0.75rem; }
    .sidebar-item {
      display: block; width: 100%; padding: 0.6rem 1.25rem; font-size: 0.9rem; color: var(--text);
      background: none; border: none; border-left: 3px solid transparent; cursor: pointer;
      text-align: left; font-family: inherit; transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-item:hover { background: rgba(34,197,94,0.06); }
    .sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(34,197,94,0.1); }
    .sidebar-item .name { font-weight: 500; }
    .sidebar-item .repo { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }
    .main { flex: 1; overflow: auto; padding: 2rem 1.5rem; }
    .current-project-banner {
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.35rem; margin-bottom: 1rem; padding: 0.6rem 1rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem;
    }
    .current-project-banner .label { color: var(--text-muted); }
    .current-project-banner .value { color: var(--accent); font-weight: 500; }
    .current-project-banner .repo { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <header class="top-strip" style="display:flex;align-items:center;gap:1.5rem;padding:0.75rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.9rem">
    <a href="/chat" style="color:var(--text);text-decoration:none;font-weight:600">Claw Bot</a>
    <a href="/daily" style="color:var(--text-muted);text-decoration:none">日报周报</a>
    <a href="/guide" style="color:var(--accent);text-decoration:none;font-weight:500">仓库文档</a>
    <a href="/config" style="color:var(--text-muted);text-decoration:none">配置</a>
    <a href="/copy" style="color:var(--text-muted);text-decoration:none">批量文案</a>
  </header>
  <div class="app-wrap">
    <aside class="sidebar">
      <div class="sidebar-title">项目清单</div>
      <div id="sidebarList">
        <p style="padding:0 1.25rem;color:var(--text-muted);font-size:0.85rem">加载中...</p>
      </div>
    </aside>
    <div class="main">
  <div class="container">
    <div class="top-bar">
      <h1>仓库文档与代码分析</h1>
    </div>
    <div class="current-project-banner" id="currentProjectBanner">
      <span class="label">当前项目：</span>
      <span class="value" id="currentProjectName">—</span>
      <span class="repo" id="currentProjectRepo"></span>
    </div>
    <div class="repo-bar">
      <label>仓库：</label>
      <input type="text" id="repoInput" placeholder="owner/repo 如 olenmacias3241-design/tonny-clawbot" />
      <button type="button" id="repoGo">查看</button>
    </div>
    <p class="current-project" id="currentProjectLabel" style="display:none"></p>
    <div class="tabs">
      <button class="tab active" data-doc="guide">项目说明</button>
      <button class="tab" data-doc="code">代码分析</button>
    </div>
    <div class="content-panel" id="mainContent">
      <p style="color:var(--text-muted)">加载中...</p>
    </div>
  </div>
  </div>
  </div>
  <script>
    const API_BASE = '';
    const mainContent = document.getElementById('mainContent');
    const repoInput = document.getElementById('repoInput');
    let cachedGuide = null, cachedCode = null;
    let currentRepo = '';
    let repoNameMap = {};

    function getRepoParam() {
      const params = new URLSearchParams(window.location.search);
      return (params.get('repo') || '').trim();
    }
    async function setRepoFromUrl() {
      currentRepo = getRepoParam();
      if (!currentRepo) {
        try {
          const res = await fetch(`${API_BASE}/api/config/default-guide-repo`);
          const data = await res.json();
          if (data.repo) {
            currentRepo = data.repo;
            repoInput.value = currentRepo;
            const url = new URL(window.location.href);
            url.searchParams.set('repo', currentRepo);
            window.history.replaceState({}, '', url.toString());
          }
        } catch (e) { /* 忽略，留空则看当前项目 */ }
      } else {
        repoInput.value = currentRepo;
      }
      updateCurrentProjectLabel();
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s || '';
      return div.innerHTML;
    }

    function apiUrl(path) {
      if (!currentRepo) return `${API_BASE}${path}`;
      return `${API_BASE}${path}?repo=${encodeURIComponent(currentRepo)}`;
    }

    function setRepoAndLoad(repo) {
      repo = (repo || '').trim();
      currentRepo = repo;
      repoInput.value = currentRepo;
      updateCurrentProjectLabel();
      const url = new URL(window.location.href);
      if (currentRepo) url.searchParams.set('repo', currentRepo);
      else url.searchParams.delete('repo');
      window.history.replaceState({}, '', url.toString());
      document.querySelectorAll('#sidebarList .sidebar-item').forEach(btn => {
        btn.classList.toggle('active', (btn.dataset.repo || '') === currentRepo);
      });
      const activeTab = document.querySelector('.tab.active');
      if (activeTab && activeTab.dataset.doc === 'code') loadCodeAnalysis(repo);
      else loadProjectGuide(repo);
    }

    function updateCurrentProjectLabel() {
      const nameEl = document.getElementById('currentProjectName');
      const repoEl = document.getElementById('currentProjectRepo');
      if (nameEl) nameEl.textContent = currentRepo ? (repoNameMap[currentRepo] || currentRepo) : '—';
      if (repoEl) { repoEl.textContent = currentRepo ? currentRepo : ''; repoEl.style.display = currentRepo ? 'inline' : 'none'; }
    }

    async function loadProjectGuide(forceRepo) {
      const repo = (forceRepo !== undefined && forceRepo !== null) ? String(forceRepo).trim() : currentRepo;
      const key = repo || '_local_';
      if (!repo && cachedGuide && cachedGuide[key]) { mainContent.innerHTML = cachedGuide[key]; return; }
      if (repo && cachedGuide && cachedGuide[key]) { mainContent.innerHTML = cachedGuide[key]; return; }
      mainContent.innerHTML = '<p style="color:var(--text-muted)">加载中...</p>';
      const timeout = setTimeout(() => {
        if (mainContent.innerHTML === '<p style="color:var(--text-muted)">加载中...</p>') {
          mainContent.innerHTML = '<p class="danger">请求超时，请刷新重试</p>';
        }
      }, 15000);
      try {
        const url = repo ? `${API_BASE}/api/docs/project-guide?repo=${encodeURIComponent(repo)}` : `${API_BASE}/api/docs/project-guide`;
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));
        clearTimeout(timeout);
        if (res.ok && data.content) {
          try {
            const html = (typeof marked !== 'undefined' ? marked.parse(data.content) : '<pre>' + escapeHtml(data.content) + '</pre>');
            if (!cachedGuide) cachedGuide = {};
            cachedGuide[key] = html;
            mainContent.innerHTML = html;
          } catch (err) {
            mainContent.innerHTML = '<pre>' + escapeHtml(data.content) + '</pre>';
          }
        } else if (res.status === 404) {
          mainContent.innerHTML = '<p class="danger">未找到项目说明文档（PROJECT_GUIDE.md 或 README.md）</p>';
        } else {
          mainContent.innerHTML = '<p class="danger">加载失败' + (data.detail ? ': ' + escapeHtml(data.detail) : '') + '</p>';
        }
      } catch (e) {
        clearTimeout(timeout);
        mainContent.innerHTML = '<p class="danger">加载失败: ' + escapeHtml(e.message || '网络错误') + '</p>';
      }
    }

    function renderCodeAnalysis(data) {
      const desc = data.section_descriptions || {};
      const sections = data.sections || {};
      const order = Object.keys(sections).sort((a, b) => (a === 'root' ? -1 : b === 'root' ? 1 : a.localeCompare(b)));
      let html = '<div class="code-analysis">';
      for (const sec of order) {
        const items = sections[sec];
        if (!items || items.length === 0) continue;
        html += '<h4 style="margin:1rem 0 0.5rem;color:var(--accent)">' + escapeHtml(sec) + '</h4>';
        html += '<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem">' + escapeHtml(desc[sec] || '') + '</p>';
        for (const file of items) {
          if (file.path.includes('__init__')) continue;
          html += '<div class="code-file">';
          html += '<div style="font-family:JetBrains Mono;font-size:0.85rem;color:var(--accent);margin-bottom:0.35rem">' + escapeHtml(file.path) + '</div>';
          if (file.module_doc) html += '<p style="font-size:0.9rem;margin:0.25rem 0;color:var(--text-muted)">' + escapeHtml(file.module_doc) + '</p>';
          for (const c of file.classes || []) {
            html += '<div style="margin-top:0.5rem"><strong>' + escapeHtml(c.name) + '</strong>';
            if (c.doc) html += ': ' + escapeHtml(c.doc);
            html += '</div>';
            if (c.methods && c.methods.length) {
              html += '<div style="font-size:0.85rem;margin-left:1rem;color:var(--text-muted)">';
              html += c.methods.slice(0,5).map(m => m.name + (m.doc ? ': ' + m.doc.slice(0,40) : '')).map(s => escapeHtml(s)).join(' · ');
              html += '</div>';
            }
          }
          html += '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    async function loadCodeAnalysis(forceRepo) {
      const repo = (forceRepo !== undefined && forceRepo !== null) ? String(forceRepo).trim() : currentRepo;
      const key = repo || '_local_';
      if (!repo && cachedCode && cachedCode[key]) { mainContent.innerHTML = cachedCode[key]; return; }
      if (repo && cachedCode && cachedCode[key]) { mainContent.innerHTML = cachedCode[key]; return; }
      mainContent.innerHTML = '<p style="color:var(--text-muted)">分析代码中...</p>';
      try {
        const url = repo ? `${API_BASE}/api/docs/code-analysis?repo=${encodeURIComponent(repo)}` : `${API_BASE}/api/docs/code-analysis`;
        const res = await fetch(url);
        const data = await res.json();
        if (res.ok && data.sections) {
          if (!cachedCode) cachedCode = {};
          cachedCode[key] = renderCodeAnalysis(data);
          mainContent.innerHTML = cachedCode[key];
        } else {
          mainContent.innerHTML = '<p class="danger">分析失败</p>';
        }
      } catch (e) {
        mainContent.innerHTML = '<p class="danger">分析失败: ' + escapeHtml(e.message) + '</p>';
      }
    }

    document.getElementById('repoGo').addEventListener('click', () => {
      currentRepo = (repoInput.value || '').trim();
      const url = new URL(window.location.href);
      if (currentRepo) url.searchParams.set('repo', currentRepo);
      else url.searchParams.delete('repo');
      window.location.href = url.toString();
    });

    fetch(`${API_BASE}/config/github-repos`).then(r=>r.json()).then(d=>{
      const list = d.repos || [];
      const repos = list.map(x => typeof x === 'string' ? { repo: x, name: x } : { repo: x.repo || '', name: (x.name || x.repo || '').trim() });
      repos.forEach(item => { if (item.repo) repoNameMap[item.repo] = item.name || item.repo; });
      const el = document.getElementById('sidebarList');
      let html = '';
      repos.forEach(item => {
        if (!item.repo) return;
        const repo = item.repo;
        const name = item.name || repo;
        html += `<button type="button" class="sidebar-item" data-repo="${escapeHtml(repo)}" data-name="${escapeHtml(name)}"><span class="name">${escapeHtml(name)}</span><span class="repo">${escapeHtml(repo)}</span></button>`;
      });
      if (!html) html = '<p style="padding:0 1.25rem;color:var(--text-muted);font-size:0.85rem">未配置仓库</p>';
      el.innerHTML = html;
      el.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.addEventListener('click', () => setRepoAndLoad(btn.dataset.repo || ''));
      });
      document.querySelectorAll('#sidebarList .sidebar-item').forEach(btn => {
        btn.classList.toggle('active', (btn.dataset.repo || '') === currentRepo);
      });
      updateCurrentProjectLabel();
    }).catch(() => {
      document.getElementById('sidebarList').innerHTML = '<p style="padding:0 1.25rem;color:var(--text-muted);font-size:0.85rem">加载失败</p>';
    });

    (async function init() {
      await setRepoFromUrl();
      updateCurrentProjectLabel();
      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          if (t.dataset.doc === 'code') loadCodeAnalysis();
          else loadProjectGuide();
        });
      });
      loadProjectGuide();
      setTimeout(() => {
        document.querySelectorAll('#sidebarList .sidebar-item').forEach(btn => {
          btn.classList.toggle('active', (btn.dataset.repo || '') === currentRepo);
        });
      }, 300);
    })();
  </script>
</body>
</html>
